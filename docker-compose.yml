services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mysql
    networks:
      - sheep-network

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Root@123
      MYSQL_DATABASE: sheep_farm
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sheep-network

volumes:
  mysql_data:

networks:
  sheep-network: